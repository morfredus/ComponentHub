<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventaire</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="inventory.css">
</head>
<body>
<main>
  <div class="card inv-toolbar-card">
    <div class="toolbar">
      <input id="q" type="search" placeholder="Rechercher (nom, référence, fabricant...)">
      <select id="kindFilter">
        <option value="">Tous types</option>
        <option value="component">Composants</option>
        <option value="module">Modules</option>
        <option value="tool">Outils</option>
        <option value="consumable">Consommables</option>
      </select>
      <input id="categoryFilter" list="categoryList" placeholder="Catégorie">
      <select id="statusFilter">
        <option value="">Tous statuts</option>
        <option value="to_test">🟡 À tester</option>
        <option value="validating">🚧 En cours de validation</option>
        <option value="validated">🟢 Validé</option>
        <option value="defective">🛑 Défectueux</option>
        <option value="archived">📦 Archivé</option>
      </select>
      <label class="checkbox"><input type="checkbox" id="lowStockFilter"> Stock faible seulement</label>
      <button id="addBtn">+ Ajouter</button>
    </div>
    <datalist id="categoryList"></datalist>
    <!-- En-têtes de colonnes intégrés au cartouche filtres (donc figés avec
         lui). Alignés au tableau ci-dessous via la mise en page à colonnes
         fixes partagée `.inv-grid` (mêmes largeurs en %). -->
    <table class="inv-grid inv-head">
      <thead><tr>
        <th>Type</th><th>Nom</th><th>Référence</th><th>Fabricant</th><th>Catégorie</th>
        <th>Qté</th><th>Emplacement</th><th>Statut</th><th></th>
      </tr></thead>
    </table>
  </div>

  <div class="card">
    <div class="table-scroll">
      <table id="tbl" class="inv-grid">
        <tbody></tbody>
      </table>
    </div>
    <p id="empty" class="muted" hidden>Aucun composant.</p>
  </div>
</main>

<dialog id="componentDialog" class="wide">
  <form id="componentForm" method="dialog">
    <h2 id="componentDialogTitle">Nouveau composant</h2>
    <input type="hidden" id="f_id">
    <datalist id="locationDatalist"></datalist>
    <datalist id="interfaceList">
      <option value="I2C"><option value="SPI"><option value="UART"><option value="USB">
      <option value="GPIO"><option value="PWM"><option value="Analogique"><option value="CAN">
      <option value="1-Wire"><option value="Bluetooth"><option value="WiFi"><option value="Ethernet">
      <option value="RS232"><option value="RS485"><option value="JTAG"><option value="SWD">
    </datalist>

    <fieldset>
      <legend>Général</legend>
      <label>Type
        <select id="f_kind">
          <option value="component">Composant</option>
          <option value="module">Module</option>
          <option value="tool">Outil</option>
          <option value="consumable">Consommable</option>
        </select>
      </label>
      <label>Nom <input id="f_name" required></label>
      <label>Référence <input id="f_reference"></label>
      <label>Fabricant <input id="f_manufacturer"></label>
      <label class="span-all">Description <textarea id="f_description" rows="2"></textarea></label>
      <label>Catégorie <input id="f_category" list="categoryList"></label>
      <label>Sous-catégorie <input id="f_subcategory"></label>
      <label>Type <input id="f_type"></label>
    </fieldset>

    <fieldset>
      <legend>Caractéristiques techniques</legend>
      <label>Tension <input id="f_voltage" placeholder="ex: 3.3V-5V"></label>
      <label>Courant <input id="f_current"></label>
      <label>Interface <input id="f_interfaceType" list="interfaceList" placeholder="I2C, SPI, UART..."></label>
      <label>Protocoles <input id="f_protocols"></label>
      <label>Adresse I²C <input id="f_i2cAddress"></label>
      <label>Fréquence <input id="f_frequency"></label>
      <label>Nombre de broches <input id="f_pinCount" type="number" min="0"></label>
      <label>Compatibilité <input id="f_compatibility"></label>
    </fieldset>

    <fieldset>
      <legend>Achat</legend>
      <label>Prix <input id="f_price" type="number" step="0.01" min="0"></label>
      <label>Fournisseur <input id="f_supplier"></label>
      <label>Date d'achat <input id="f_purchaseDate" type="date"></label>
      <label>Date de réception <input id="f_receptionDate" type="date"></label>
      <label>Garantie <input id="f_warranty"></label>
    </fieldset>

    <fieldset>
      <legend>État &amp; stock</legend>
      <label>État physique
        <select id="f_state">
          <option value="">—</option>
          <option value="neuf">Neuf</option>
          <option value="occasion">Occasion</option>
          <option value="recupere">Récupéré</option>
          <option value="hs">Hors service</option>
        </select>
      </label>
      <label>Statut de validation
        <select id="f_status">
          <option value="to_test">À tester</option>
          <option value="validating">En cours de validation</option>
          <option value="validated">Validé</option>
          <option value="defective">Défectueux</option>
          <option value="archived">Archivé</option>
        </select>
      </label>
      <label>Provenance <input id="f_origin" placeholder="ex: appareil d'origine si pièce récupérée"></label>
      <label>Emplacement
        <input id="f_locationId" list="locationDatalist" placeholder="Tapez ou choisissez un emplacement existant">
      </label>
      <label>Quantité <input id="f_quantity" type="number" min="0"></label>
      <label>Stock minimum <input id="f_minStock" type="number" min="0"></label>
      <label>Stock idéal <input id="f_idealStock" type="number" min="0"></label>
      <label class="span-all">Notes <textarea id="f_notes" rows="2"></textarea></label>
    </fieldset>

    <label class="checkbox">
      <input type="checkbox" id="f_salvageMode">
      Mode récupération : garder provenance / emplacement / état pour ajouter le composant suivant
    </label>

    <div class="dialog-actions">
      <button type="button" id="cancelBtn">Annuler</button>
      <button type="submit">Enregistrer</button>
    </div>
  </form>
</dialog>

<dialog id="movementDialog">
  <form id="movementForm" method="dialog">
    <h2>Mouvement de stock — <span id="movementComponentName"></span></h2>
    <input type="hidden" id="m_componentId">
    <label>Type
      <select id="m_type">
        <option value="in">Entrée</option>
        <option value="out">Sortie</option>
        <option value="correction">Correction (fixe la quantité)</option>
        <option value="inventory">Inventaire (fixe la quantité)</option>
      </select>
    </label>
    <label>Quantité <input id="m_quantity" type="number" min="0" required></label>
    <label>Note <input id="m_note"></label>
    <div class="dialog-actions">
      <button type="button" id="movementCancelBtn">Fermer</button>
      <button type="submit">Enregistrer</button>
    </div>
    <h3>Historique</h3>
    <ul id="movementHistory" class="history"></ul>
  </form>
</dialog>

<dialog id="documentDialog">
  <form id="documentAddForm">
    <h2>Documents — <span id="documentOwnerName"></span></h2>
    <input type="hidden" id="d_ownerId">
    <label>Titre <input id="d_title" required></label>
    <label>Catégorie
      <select id="d_category">
        <option value="datasheet">Datasheet</option>
        <option value="manual">Manuel</option>
        <option value="schematic">Schéma</option>
        <option value="pinout">Pinout</option>
        <option value="link">Lien utile</option>
        <option value="other">Autre</option>
      </select>
    </label>
    <label>URL ou chemin
      <input id="d_url" placeholder="https://... ou /fichier.pdf (voir page Fichiers)" required>
    </label>
    <label>Notes <input id="d_notes"></label>
    <div class="dialog-actions">
      <button type="button" id="documentCloseBtn">Fermer</button>
      <button type="submit">Ajouter</button>
    </div>
    <ul id="documentList" class="history"></ul>
  </form>
</dialog>

<script src="menu.js"></script>
<script src="inventory.js"></script>
</body>
</html>
