<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emplacements</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="inventory.css">
</head>
<body>
<main>
  <div class="card">
    <h2>Nouvel emplacement</h2>
    <form id="locForm">
      <label>Nom <input id="l_name" required></label>
      <label>Emplacement parent
        <select id="l_parentId"><option value="0">— racine —</option></select>
      </label>
      <input type="hidden" id="l_id">
      <button type="submit">Enregistrer</button>
      <button type="button" id="l_cancel" hidden>Annuler la modification</button>
    </form>
  </div>

  <div class="card">
    <div class="table-scroll">
      <table id="tbl">
        <thead><tr><th>Emplacement</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <p id="empty" class="muted" hidden>Aucun emplacement.</p>
  </div>
</main>

<script src="menu.js"></script>
<script>
var locationsById = {};

function locationPath(id) {
  var parts = [];
  var guard = 0;
  while (id && locationsById[id] && guard++ < 20) {
    parts.unshift(locationsById[id].name);
    id = locationsById[id].parentId;
  }
  return parts.join(' > ');
}

function isDescendant(candidateId, ofId) {
  var guard = 0;
  var id = candidateId;
  while (id && guard++ < 20) {
    if (id === ofId) return true;
    id = locationsById[id] ? locationsById[id].parentId : 0;
  }
  return false;
}

function refresh() {
  fetch('/api/inventory/locations').then(function (r) { return r.json(); }).then(function (list) {
    locationsById = {};
    list.forEach(function (l) { locationsById[l.id] = l; });

    var editingId = parseInt(document.getElementById('l_id').value, 10) || 0;
    var sel = document.getElementById('l_parentId');
    sel.innerHTML = '<option value="0">— racine —</option>';
    list.forEach(function (l) {
      if (editingId && (l.id === editingId || isDescendant(l.id, editingId))) return;
      var o = document.createElement('option');
      o.value = l.id;
      o.textContent = locationPath(l.id);
      sel.appendChild(o);
    });

    var tbody = document.querySelector('#tbl tbody');
    tbody.innerHTML = '';
    list.forEach(function (l) {
      var tr = document.createElement('tr');
      tr.innerHTML = '<td>' + locationPath(l.id) + '</td><td class="row-actions">' +
        '<button data-action="edit">Modifier</button>' +
        '<button data-action="delete">Supprimer</button></td>';
      tr.querySelector('[data-action=edit]').addEventListener('click', function () { startEdit(l); });
      tr.querySelector('[data-action=delete]').addEventListener('click', function () { remove(l); });
      tbody.appendChild(tr);
    });
    document.getElementById('empty').hidden = list.length !== 0;
  });
}

function startEdit(l) {
  document.getElementById('l_id').value = l.id;
  document.getElementById('l_name').value = l.name;
  document.getElementById('l_cancel').hidden = false;
  refresh();
  document.getElementById('l_parentId').value = String(l.parentId || 0);
}

function resetForm() {
  document.getElementById('l_id').value = '';
  document.getElementById('l_name').value = '';
  document.getElementById('l_parentId').value = '0';
  document.getElementById('l_cancel').hidden = true;
}

function remove(l) {
  AppStatus.confirm('Supprimer "' + l.name + '" ?', function () {
    fetch('/api/inventory/location?id=' + l.id, { method: 'DELETE' }).then(function () {
      AppStatus.success('"' + l.name + '" supprimé.');
      refresh();
    });
  });
}

document.getElementById('l_cancel').addEventListener('click', function () { resetForm(); refresh(); });

document.getElementById('locForm').addEventListener('submit', function (e) {
  e.preventDefault();
  var body = {
    id: parseInt(document.getElementById('l_id').value, 10) || 0,
    name: document.getElementById('l_name').value,
    parentId: parseInt(document.getElementById('l_parentId').value, 10) || 0
  };
  fetch('/api/inventory/location', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).then(function () { resetForm(); refresh(); });
});

refresh();
</script>
</body>
</html>
