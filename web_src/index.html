<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Tableau de bord</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="inventory.css">
</head>
<body>
<main>
  <div class="card">
    <div class="section-title"><h2>État de l'inventaire</h2></div>
    <div class="stat-grid" id="statGrid"></div>
  </div>

  <div class="card" id="lowStockCard" hidden>
    <div class="section-title">
      <h2>Stock faible</h2>
      <a href="/inventory?lowStock=1">Voir tout &rarr;</a>
    </div>
    <ul class="low-stock-list" id="lowStockList"></ul>
  </div>

  <div class="card">
    <div class="section-title"><h2>Accès rapide</h2></div>
    <div class="action-grid">
      <a class="action-btn" href="/inventory?action=add">+ Ajouter un composant</a>
      <a class="action-btn" href="/inventory">Voir l'inventaire</a>
      <a class="action-btn" href="/locations">Emplacements</a>
      <a class="action-btn" href="/projects">Projets</a>
      <a class="action-btn" href="/import-export">Import / Export</a>
    </div>
  </div>

  <div class="card">
    <div class="section-title"><h2>Système</h2></div>
    <div class="action-grid">
      <a class="action-btn secondary" href="/system">Système</a>
      <a class="action-btn secondary" href="/files">Fichiers</a>
      <a class="action-btn secondary" href="/logs">Logs</a>
      <a class="action-btn secondary" href="/ota">Mise à jour</a>
    </div>
  </div>
</main>

<script src="menu.js"></script>
<script src="index.js"></script>
</body>
</html>
