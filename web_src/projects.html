<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projets</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="inventory.css">
</head>
<body>
<main>
  <div class="card">
    <div class="toolbar">
      <h2 style="margin:0;flex:1;">Projets</h2>
      <button id="addProjectBtn">+ Nouveau projet</button>
    </div>
  </div>

  <div class="card">
    <div class="table-scroll">
      <table id="projectTbl">
        <thead><tr><th>Nom</th><th>Version</th><th>Statut</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <p id="projectEmpty" class="muted" hidden>Aucun projet.</p>
  </div>

  <div class="card" id="detailCard" hidden>
    <h2 id="detailName"></h2>
    <p id="detailDescription" class="muted"></p>

    <h3>Composants nécessaires</h3>
    <p class="muted">Choisissez un composant de l'inventaire dans la liste, ou tapez le nom d'un élément que vous n'avez pas encore : il sera ajouté « à acheter ».</p>
    <form id="bomAddForm" class="toolbar">
      <input id="bomComponentInput" list="bomComponentList" placeholder="Composant de l'inventaire, ou nouvel élément à acheter" style="flex:1;min-width:240px;">
      <datalist id="bomComponentList"></datalist>
      <input id="bomQuantity" type="number" min="1" value="1" style="max-width:90px;" aria-label="Quantité">
      <button type="submit">Ajouter</button>
    </form>

    <p id="bomSummary" class="bom-summary"></p>
    <div class="table-scroll">
      <table id="bomTbl">
        <thead><tr><th>Élément</th><th>Requis</th><th>Disponible</th><th>Manquant</th><th>État</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="toolbar" style="margin-top:0.8rem;">
      <button id="printBomBtn" type="button">Imprimer / PDF</button>
      <button id="documentsBtn" type="button">Documentation du projet</button>
    </div>
  </div>
</main>

<dialog id="projectDialog" class="wide">
  <form id="projectForm" method="dialog">
    <h2 id="projectDialogTitle">Nouveau projet</h2>
    <input type="hidden" id="p_id">
    <fieldset>
      <legend>Détails</legend>
      <label>Nom <input id="p_name" required></label>
      <label>Version <input id="p_version"></label>
      <label>Firmware <input id="p_firmware"></label>
      <label>Dépôt Git <input id="p_gitRepo" placeholder="https://..."></label>
      <label>Statut
        <select id="p_status">
          <option value="in_progress">En cours</option>
          <option value="done">Terminé</option>
          <option value="paused">En pause</option>
          <option value="archived">Archivé</option>
        </select>
      </label>
      <label class="span-all">Description <textarea id="p_description" rows="2"></textarea></label>
      <label class="span-all">Notes <textarea id="p_notes" rows="2"></textarea></label>
    </fieldset>
    <div class="dialog-actions">
      <button type="button" id="projectCancelBtn">Annuler</button>
      <button type="submit">Enregistrer</button>
    </div>
  </form>
</dialog>

<dialog id="documentDialog">
  <form id="documentAddForm">
    <h2>Documentation — <span id="documentOwnerName"></span></h2>
    <input type="hidden" id="d_ownerId">
    <label>Titre <input id="d_title" required></label>
    <label>Catégorie
      <select id="d_category">
        <option value="datasheet">Datasheet</option>
        <option value="manual">Manuel</option>
        <option value="schematic">Schéma</option>
        <option value="pinout">Pinout</option>
        <option value="link">Lien utile</option>
        <option value="other">Autre</option>
      </select>
    </label>
    <label>URL ou chemin
      <input id="d_url" placeholder="https://... ou /fichier.pdf (voir page Fichiers)" required>
    </label>
    <label>Notes <input id="d_notes"></label>
    <div class="dialog-actions">
      <button type="button" id="documentCloseBtn">Fermer</button>
      <button type="submit">Ajouter</button>
    </div>
    <ul id="documentList" class="history"></ul>
  </form>
</dialog>

<script src="menu.js"></script>
<script src="projects.js"></script>
</body>
</html>
