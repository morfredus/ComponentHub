<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catégories</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="inventory.css">
</head>
<body>
<main>
  <div class="card">
    <h2>Nouvelle catégorie</h2>
    <p class="muted">Une catégorie est aussi créée automatiquement dès qu'elle est saisie sur une fiche composant — cette page sert à les gérer (renommer, supprimer) après coup.</p>
    <form id="catForm">
      <label>Nom <input id="c_name" required></label>
      <input type="hidden" id="c_id">
      <button type="submit">Enregistrer</button>
      <button type="button" id="c_cancel" hidden>Annuler la modification</button>
    </form>
  </div>

  <div class="card">
    <div class="table-scroll">
      <table id="tbl">
        <thead><tr><th>Catégorie</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <p id="empty" class="muted" hidden>Aucune catégorie.</p>
  </div>
</main>

<script src="menu.js"></script>
<script>
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
    return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c];
  });
}

function refresh() {
  fetch('/api/inventory/categories').then(function (r) { return r.json(); }).then(function (list) {
    var tbody = document.querySelector('#tbl tbody');
    tbody.innerHTML = '';
    list.forEach(function (c) {
      var tr = document.createElement('tr');
      tr.innerHTML = '<td>' + escapeHtml(c.name) + '</td><td class="row-actions">' +
        '<button data-action="edit">Modifier</button>' +
        '<button data-action="delete">Supprimer</button></td>';
      tr.querySelector('[data-action=edit]').addEventListener('click', function () { startEdit(c); });
      tr.querySelector('[data-action=delete]').addEventListener('click', function () { remove(c); });
      tbody.appendChild(tr);
    });
    document.getElementById('empty').hidden = list.length !== 0;
  });
}

function startEdit(c) {
  document.getElementById('c_id').value = c.id;
  document.getElementById('c_name').value = c.name;
  document.getElementById('c_cancel').hidden = false;
}

function resetForm() {
  document.getElementById('c_id').value = '';
  document.getElementById('c_name').value = '';
  document.getElementById('c_cancel').hidden = true;
}

function remove(c) {
  AppStatus.confirm('Supprimer "' + c.name + '" ?', function () {
    fetch('/api/inventory/category?id=' + c.id, { method: 'DELETE' }).then(function () {
      AppStatus.success('"' + c.name + '" supprimée.');
      refresh();
    });
  });
}

document.getElementById('c_cancel').addEventListener('click', function () { resetForm(); });

document.getElementById('catForm').addEventListener('submit', function (e) {
  e.preventDefault();
  var body = {
    id: parseInt(document.getElementById('c_id').value, 10) || 0,
    name: document.getElementById('c_name').value
  };
  fetch('/api/inventory/category', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).then(function () { resetForm(); refresh(); });
});

refresh();
</script>
</body>
</html>
