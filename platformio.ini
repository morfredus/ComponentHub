; ComponentHub — PlatformIO Project Configuration File
;
; Bâti sur la base ESP32-Foundation (src/core/, src/services/) : ces briques
; génériques (WiFi, web, OTA, stockage, logs, config) ne sont pas modifiées
; ici. Le cœur métier de ComponentHub vit dans src/domain/ (indépendant de la
; plateforme) et src/modules/ (glue domaine <-> HTTP) — voir docs/ARCHITECTURE.md.

[platformio]
description  = ComponentHub - Gestion inventaire Dev Electronique
default_envs = esp32s3_n16r8

[env:esp32s3_n16r8]
platform      = espressif32
board         = esp32-s3-devkitc-1-n16r8v
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

board_build.usb_mode        = "cdc"
board_build.usb_cdc_on_boot = 1
board_build.filesystem      = littlefs

; Génère project_config.h (BUILD_DATE/BUILD_TIME/GIT_COMMIT/PROJECT_VERSION),
; puis régénère l'interface web embarquée (web_src/ -> web/ -> tableaux
; PROGMEM dans src/generated/) avant chaque compilation — voir
; tools/generate_web_assets.py et docs/ARCHITECTURE.md. `pio run --target
; upload` met donc à jour firmware ET interface web en une seule opération ;
; LittleFS (littlefs ci-dessous) ne contient plus que les données réelles de
; l'inventaire, jamais régénérées ni écrasées par un build.
extra_scripts =
    pre:tools/build_info.py
    pre:tools/generate_web_assets.py

build_unflags =
    -std=gnu++11
    -std=gnu++14

build_flags =
    -std=gnu++17
    -D PROJECT_NAME='"ComponentHub"'

lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    https://github.com/ESP32Async/AsyncTCP.git
    https://github.com/ESP32Async/ESPAsyncWebServer.git
